body:
  text: 謹啓諷閻羅王預修生七往生淨土經誓勸有緣以五會啓經入讚念阿彌陀佛成都府大聖慈寺沙門藏川述佛說閻羅王授記四衆逆修生七往生淨土經讚曰如來臨般涅槃時廣召天靈及地祇因為琰魔王授記乃傳生七預修儀如是我聞一時佛在鳩尸那城阿維跋提河邊婆羅雙樹間臨般涅槃時舉身放光普照大衆及諸菩薩摩訶薩天龍神王天王帝釋四天大王大梵天王阿修羅王諸大國王閻羅天子大山府君司命司録五道大神地獄官典悉來集會敬禮世尊合掌而立讚曰時佛舒光滿大千普臻龍鬼會人天釋梵諸天冥密衆咸來稽首世尊前佛告諸大衆閻羅天子於未來世當得作佛名曰普賢王如來十號具足國土嚴淨百寶莊嚴國名華嚴菩薩充滿讚曰世尊此日記閻羅不久當來證佛陀莊嚴寶國常清淨菩薩修行衆甚多爾時阿難白佛言世尊閻羅天子以何因緣處斷冥間復於此會便得授於當來果記佛言於彼冥途為諸王者有二因緣一是住不思議解脫不動地菩薩為欲攝化極苦衆生示現作彼琰魔等王二為多生習善犯戒故退落琰魔天中作大魔王管攝諸鬼科斷閻浮提內十惡五逆一切罪人繫閇牢獄日夜受苦輪轉其中隨業報身定生注死今此琰魔天子因緣已熟是故我記來世寶圓證大菩提汝等人天不應疑惑讚曰悲增普化示威靈六道輪回不暫停教化厭苦思安樂故現閻羅天子形若復有人造此經受持讀誦捨命之後不生三塗不入一切諸大地獄讚曰若人信法不思議書寫經文聽受持捨命頓超三惡道此身長免入阿鼻在生之日殺父害母破齊破戒殺豬牛羊雞狗毒蛇一切重罪應入地獄十劫五劫若造此經及諸尊像記在業鏡閻王歡喜判放其人生富貴家免其罪過讚曰破齊毀戒殺雞豬業鏡照然報不虗若造此經兼𦘕像閻王判放罪銷除若有善男子善女人比丘比丘尼優婆塞優婆夷預修生七齊者每月二時供養三寶祈設十王修名納狀奏上六曹善業童子奏上天曹地府官等記在名案身到之日便得配生快樂之處不住中陰四十九日不待男女追救命過十王若闕一齊滯在一王留連受苦不得出生遲滯一年是故勸汝作此要事祈往生報讚曰四衆修齊及有時三旬兩供是常儀莫使闕緣功德小始交中陰滯冥司爾時地藏菩薩龍樹菩薩救苦觀世音菩薩常悲菩薩陀羅尼菩薩金剛藏菩薩各各還從本道光中至如來所異口同聲讚歎世尊哀愍凡夫說此妙法死救生頂禮佛足讚曰足膝齎胸口及眉六光菩薩運深悲各各同聲咸讚歎勤勤化物莫生疲爾時二十八重一切獄主閻羅天子六道冥官禮拜發願若有四衆比丘比丘尼優婆塞優婆夷若造此經讀誦一偈我當免其一切苦楚送出地獄住生天道不令稽滯隔宿受苦讚曰冥官注記及閻王諸佛弘經禮讚揚四衆有能持一偈我皆送出往天堂爾時閻羅天子說偈白佛南無阿羅訶衆生苦業多輪回無定相猶如水上波讚曰閻王白佛說伽他愍念衆生罪苦多六道輪回無定相生滅還同水上波願得智慧風飄墮法輪河光明照世界巡歷悉經過普救衆生苦降伏攝諸魔四王行國界傳佛修多羅讚曰願佛興揚智慧風飄歸法海洗塵護世四王同發願常傳經典廣流通凡夫修善小顛倒信邪多持經免地獄書寫免灾痾超度三界難永不見藥叉生處登高位富貴壽延遐讚曰惡業凡夫善力微信邪倒見入阿鼻欲求富樂家長命書寫經文聽受持至心誦此經天王恆記録欲得無罪咎莫殺祀神靈為此入地獄念佛禮真經應當自誡勗手執金剛刀斷除魔種族讚曰罪苦三塗業易成都緣殺命祭神明願執金剛真慧劒斬除魔族悟無生佛行平等心衆生不具足修福似微塵造罪如山嶽欲得命延長當修造此經能除地獄苦往生豪貴家善神恆守護讚曰罪如山嶽等恆沙福小微塵數未多猶得善神常守護往生豪富信心家造經讀誦人忽爾謝報齡天王恆引接菩薩捧花迎隨心往淨土八百億千生修行滿證入金剛三昧城讚曰若人奉佛造持經菩薩臨終自往迎淨國修行圓滿已當來正覺入金城爾時佛告阿難一切龍神八部及諸大臣閻羅天子大山府君司命司録五道大神地獄官等行道天王當起慈悲法勿有慢可容一切罪人慈孝男女修齊造福薦拔亡人報生養之恩七七修齊造像以報父母令得生天讚曰佛告閻羅諸大神衆生罪業具難陳應為報恩客造福教蒙離苦出迷津閻羅法王白佛言世尊我等諸王皆當發使乘黑馬把黑幡著黑衣撿亡人家造何功德准名放牒抽出罪人不違誓願讚曰諸王遣使撿亡人男女修何功德因依名放出三塗獄免歷冥間遭苦辛第一七日過秦廣王讚曰一七亡人中陰身驅將隊隊數如塵且向初王齊檢點由來未渡奈河津第二七日過初江王讚曰二七亡人渡奈河千羣萬隊涉江波引路牛頭肩挾棒催行鬼卒手擎叉第三七日過宋帝王讚曰亡人三七轉恓惶始覺冥途險路長各各點名知所在羣羣驅送五官王第四七日過五官王讚曰五官業稱向空懸左右雙童業簿全輕重豈由情所願低昂自任昔因緣第五七日過閻羅王讚曰五七閻王息諍聲罪人心恨未甘情䇿髮仰頭看業鏡始知先世事分明第六七日過變成王讚曰亡人六七滯冥途切迫坐人執意愚日日只看功德力天堂地獄在須臾第七七日過大山王讚曰七七冥途中陰身專求父母會情親福業此時仍未定更看男女造何因第八百日過平等王讚曰亡人百日更恓惶身遭枷械被鞭傷男女努力造功德從慈妙善見天堂第九一年過都市王讚曰一年過此轉苦辛男女修齊福業因六道輪回仍未定造經造佛出迷津第十至三年過五道轉輪王讚曰後三所歷是開津好惡唯憑福業因不善尚憂千日內胎生産死夭亡身十齊具足免十惡罪放其生天讚曰一身六道苦茫茫十惡三塗不易當努力修齊功德具恆沙諸罪自銷亡我常使四藥叉王守護此經不令陷沒讚曰閻王奉法願弘揚普告人天衆道場我使藥叉齊守護不令隱沒永流行稽首世尊獄中罪人多是用三寶財物喧閙受罪識信之人可自誡慎勿犯三寶業報難容見此經者應當修學讚曰欲求安樂住人天必莫侵凌三寶錢一落冥間諸地獄喧喧受苦不知年爾時琰魔法王歡喜踊躍頂禮佛足退坐一面佛言此經名為閻羅王授記四衆預修生七往生淨土經汝當流傳國界依教奉行讚曰閻王退坐一心聽佛更殷勤囑此經名曰預修生七教汝兼四衆廣傳行佛說閻羅王授記四衆預修生七往生淨土經普勸有緣預修功德發心歸佛願息輪回讚二首第一首一身危脆似風燈二鼠侵欺嚙井藤苦海不修橋筏度欲憑何物得超升第二歸佛修心讚曰船橋不造此人癡遭險恓惶君始知若悟百年彈指過修齊聽法莫教遲權衡現迹誓度群類應機大聖鑑衡慈王誓盡迷倫乃證菩提甚深弘願天矣盡矣凡人現棲於幽冥則真身定降於苦類極濟沉倫拔苦與樂莫為及也道人某廣勸緇素敬成供養儀典粧䊣披閲願蒙冥祐現增福壽歷代幽魂超登樂奉祝國祚靈長民遊富城何幸如斯成化五年六月日志
